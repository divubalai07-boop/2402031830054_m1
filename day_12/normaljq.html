<!DOCTYPE html>
<html>

<head>
    <title>jQuery Example</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>

    <button id="btn">Click Here</button>

    <script>
        $(document).ready(function() {
            $("#btn").click(function() {
                alert("Hello Divu! kya haal hai?");
            });
        });
    </script>

</body>

</html>
