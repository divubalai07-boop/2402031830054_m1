<!DOCTYPE html>
<html>

<head>
    <title>jQuery Example</title>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
</head>

<body>

    <p id="demo">This is a paragraph.</p>

    <button id="btn">Change Text</button>

    <script>
        $(document).ready(function() {
            $("#btn").click(function() {
                $("#demo").text("Hello Divu!");
            });
        });
    </script>

</body>

</html>
