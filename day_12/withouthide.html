<!DOCTYPE html>
<html>

<head>
    <title>jQuery Paragraph Example</title>

    <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        
        p {
            padding: 10px;
            margin: 10px;
            border: 1px solid black;
            background-color: lightgray;
        }
        
        button {
            padding: 10px 20px;
        }
    </style>
</head>

<body>

    <h2>jQuery Example</h2>

    <p id="p1">This is Paragraph 1</p>
    <p id="p2">This is Paragraph 2</p>
    <p id="p3">This is Paragraph 3</p>

    <button id="btn">Click Here</button>

    <script>
        $("#btn").click(function() {

            $("#p1").css("background-color", "yellow");

            $("#p2").css("color", "red");

            $("#p3").css("font-size", "25px");

            alert("Paragraph Updated Successfully!");
        });
    </script>

</body>

</html>
