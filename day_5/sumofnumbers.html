<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        let sum = 0;
        for (let i = 1; i <= 5; i++) {
            sum += i;
        }
        document.write("Sum: " + sum);
        document.write("<br><br><br>");
        let i = 1;
        while (i <= 10) {
            if (i % 2 === 0) {
                document.write(i + " is even<br>");
            } else {
                document.write(i + " is odd<br>");
            }
            i++;
        }
    </script>
    <script>
        document.write("<br><br><br>");
        let j = 1;
        while (j <= 5) {
            document.write(j + "<br>");
            j++;
        }
    </script>
</body>

</html>
