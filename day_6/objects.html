<!DOCTYPE html>
<html lang="en">

<head>

    <title>new object</title>
</head>

<body>
    <script>
        var person = new Object();
        person.firstName = "John";
        person.lastName = "Doe";


        person.sayHi = () => {
            alert("welcome" + person.firstName + " " + person.lastName);
        }
        person.sayHi();
    </script>
</body>

</html>
