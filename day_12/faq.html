<!DOCTYPE html>
<html>

<head>
    <title>FAQ using jQuery</title>

    <script src="https://code.jquery.com/jquery-3.7.1.js" integrity="sha256-eKhayi8LEQwp4NKxN+CfCh+3qOVUtJn3QNZ0TciWLP4=" crossorigin="anonymous"></script>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 20px;
        }
        
        .question {
            background-color: lightblue;
            padding: 10px;
            margin-top: 10px;
            cursor: pointer;
            border: 1px solid black;
        }
        
        .answer {
            display: none;
            padding: 10px;
            background-color: #f2f2f2;
            border: 1px solid black;
        }
    </style>
</head>

<body>

    <h2>Frequently Asked Questions (FAQ)</h2>

    <div class="question">Q1. What is JavaScript?</div>
    <div class="answer">
        JavaScript is a programming language used to make web pages interactive.
    </div>

    <div class="question">Q2. What is jQuery?</div>
    <div class="answer">
        jQuery is a JavaScript library that simplifies coding.
    </div>

    <div class="question">Q3. What is HTML?</div>
    <div class="answer">
        HTML is used to create the structure of web pages.
    </div>

    <script>
        $(".question").click(function() {
            $(this).next(".answer").toggle();
        });
    </script>

</body>

</html>
